# ═══════════════════════════════════════════════════════════════
# Takhaial — Docker Swarm Stack
# Deploy with: docker stack deploy -c docker-compose.yml takhaial
# ═══════════════════════════════════════════════════════════════
version: "3.8"

services:
  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    image: takhaial-frontend:latest
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://takhaial.com
    networks:
      - web
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    image: takhaial-backend:latest
    build:
      context: ./backend
    environment:
      - CORS_ORIGINS=https://takhaial.com,https://www.takhaial.com
    networks:
      - web
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.40"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 64M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-swarm.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      - frontend
      - backend

  # ── Auto-scaler (cron-based CPU monitor) ─────────────────────
  autoscaler:
    image: docker:24-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FRONTEND_SERVICE=takhaial_frontend
      - BACKEND_SERVICE=takhaial_backend
      - MIN_REPLICAS=1
      - MAX_REPLICAS=5
      - CPU_SCALE_UP_THRESHOLD=70
      - CPU_SCALE_DOWN_THRESHOLD=20
      - CHECK_INTERVAL=30
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache bc curl 2>/dev/null
        echo "═══ Takhaial Auto-Scaler Started ═══"
        while true; do
          for SVC in $$FRONTEND_SERVICE $$BACKEND_SERVICE; do
            CURRENT=$$(docker service ls --filter "name=$$SVC" --format '{{.Replicas}}' 2>/dev/null | cut -d/ -f1)
            if [ -z "$$CURRENT" ] || [ "$$CURRENT" = "0" ]; then continue; fi

            # Get avg CPU across tasks
            TOTAL_CPU=0
            COUNT=0
            for CID in $$(docker ps -q --filter "label=com.docker.swarm.service.name=$$SVC" 2>/dev/null); do
              CPU=$$(docker stats --no-stream --format '{{.CPUPerc}}' $$CID 2>/dev/null | tr -d '%')
              if [ -n "$$CPU" ]; then
                TOTAL_CPU=$$(echo "$$TOTAL_CPU + $$CPU" | bc 2>/dev/null || echo $$TOTAL_CPU)
                COUNT=$$((COUNT + 1))
              fi
            done

            if [ $$COUNT -gt 0 ]; then
              AVG_CPU=$$(echo "scale=1; $$TOTAL_CPU / $$COUNT" | bc 2>/dev/null || echo "0")
              echo "[autoscaler] $$SVC: replicas=$$CURRENT avg_cpu=$${AVG_CPU}%"

              # Scale UP
              if [ $$(echo "$$AVG_CPU > $$CPU_SCALE_UP_THRESHOLD" | bc 2>/dev/null) = "1" ] && [ $$CURRENT -lt $$MAX_REPLICAS ]; then
                NEW=$$((CURRENT + 1))
                echo "[autoscaler] ⬆ Scaling $$SVC: $$CURRENT → $$NEW"
                docker service scale $$SVC=$$NEW 2>/dev/null
              fi

              # Scale DOWN
              if [ $$(echo "$$AVG_CPU < $$CPU_SCALE_DOWN_THRESHOLD" | bc 2>/dev/null) = "1" ] && [ $$CURRENT -gt $$MIN_REPLICAS ]; then
                NEW=$$((CURRENT - 1))
                echo "[autoscaler] ⬇ Scaling $$SVC: $$CURRENT → $$NEW"
                docker service scale $$SVC=$$NEW 2>/dev/null
              fi
            fi
          done
          sleep $$CHECK_INTERVAL
        done
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.10"
          memory: 64M

networks:
  web:
    driver: overlay

volumes:
  certbot-etc:
  certbot-var:
  certbot-webroot:
