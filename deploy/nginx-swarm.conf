# Takhaial — Nginx for Docker Swarm
# Uses Swarm internal resolver so nginx starts before upstreams are ready

# Rate limiting — separate zones per endpoint
limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=chat_limit:10m    rate=2r/s;
limit_req_status 429;

# HTTP — redirect all traffic to HTTPS, allow ACME challenge
server {
    listen 80;
    server_name takhaial.com www.takhaial.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name takhaial.com www.takhaial.com;

    ssl_certificate     /etc/letsencrypt/live/takhaial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/takhaial.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Swarm internal DNS — resolves service names at request time
    resolver 127.0.0.11 valid=5s;
    set $frontend http://frontend:3000;
    set $backend  http://backend:8000;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Backend API routes
    location /chat {
        limit_req zone=chat_limit burst=5 nodelay;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /contact {
        limit_req zone=contact_limit burst=2 nodelay;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Static assets — aggressive caching
    location /_next/static/ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(mp4|jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|ttf)$ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Frontend — everything else
    location / {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 5M;
}
